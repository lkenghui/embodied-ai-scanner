<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Scanner</title>
  <link rel="stylesheet" href="/static/styles.css?v=13" />
</head>
<body>

  <div class="top-bar">AI Research &amp; Industry Intelligence</div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <h1>AI Scanner</h1>
        <span class="logo-sub">Research &amp; Industry Intelligence</span>
      </div>
      <div class="header-right">
        <div id="last-updated" class="last-updated"></div>
        <div id="scan-status"></div>
        <button id="scan-btn">Run Scan</button>
      </div>
    </div>
    <div id="scan-progress-wrap" class="progress-wrap">
      <div id="scan-progress-bar-bg"><div id="scan-progress-bar"></div></div>
      <div id="scan-progress-label"></div>
    </div>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="all">General AI Trends</button>
      <button class="tab-btn" data-tab="embodied">Embodied AI</button>
      <button class="tab-btn" data-tab="agentic">Agentic AI</button>
      <button class="tab-btn" data-tab="physics">Physics-based AI</button>
      <button class="tab-btn" data-tab="quantum">Quantum AI</button>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stats-bar-inner">
      <div class="stat-item">
        <span class="stat-value" id="stat-articles">—</span>
        <span class="stat-label">Articles</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="stat-sources">—</span>
        <span class="stat-label">Sources</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="stat-latest">—</span>
        <span class="stat-label">Latest Article</span>
      </div>
    </div>
  </div>

  <main>

    <!-- Trends + Signals side by side -->
    <div class="insight-grid section-divider tab-content" id="tab-content">
      <section id="trends-section">
        <div class="section-header">
          <h2 id="trends-title">Weekly Trends</h2>
        </div>
        <div id="trends-content" class="insight-card">Loading...</div>
        <p id="trends-date" class="meta"></p>
      </section>

      <section id="signals-section">
        <div class="section-header">
          <h2>Weak Signals</h2>
          <span class="section-hint">Emerging on the horizon</span>
        </div>
        <div id="signals-content" class="insight-card card-signals">Loading...</div>
        <p id="signals-date" class="meta"></p>
      </section>
    </div>

    <!-- Filters -->
    <section id="filters-section" class="filters-section">
      <div class="filters-card">
        <div class="filters">
          <select id="filter-source"><option value="">All Sources</option></select>
          <select id="filter-company"><option value="">All Companies</option></select>
          <select id="filter-significance">
            <option value="">All Significance</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button id="apply-filters">Apply</button>
        </div>
      </div>
    </section>

    <!-- Articles -->
    <section id="articles-section">
      <div class="section-header">
        <h2 id="articles-title">Latest Articles</h2>
        <span id="article-count"></span>
      </div>
      <div id="articles-list" class="articles-grid"></div>
    </section>

  </main>

  <script src="/static/app.js?v=13"></script>
</body>
</html>
